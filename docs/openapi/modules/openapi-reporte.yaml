# OpenAPI Reporte Module
# Business intelligence reporting endpoints (data + XLSX/CSV export)

paths:
  /reporte/turnos:
    get:
      tags:
        - Reporte
      summary: Reporte de turnos
      description: |
        Retorna un listado de turnos con sus datos completos para análisis.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteTurnos
      security:
        - BearerAuth: []
      parameters:
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - name: idEmpleado
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por empleado asignado
        - name: idEstado
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por estado del turno
        - $ref: "../openapi-shared.yaml#/components/parameters/LimitParam"
        - $ref: "../openapi-shared.yaml#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Listado de turnos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOReporteTurnos"
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/turnos/export:
    get:
      tags:
        - Reporte
      summary: Exportar reporte de turnos
      description: |
        Exporta el reporte de turnos en formato XLSX o CSV.

        El archivo se descarga con nombre `reporte_turnos_{fecha}.{formato}`.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteTurnosExport
      security:
        - BearerAuth: []
      parameters:
        - name: formato
          in: query
          required: true
          schema:
            type: string
            enum: [xlsx, csv]
          description: Formato de exportación
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - name: idEmpleado
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por empleado asignado
        - name: idEstado
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por estado del turno
        - $ref: "../openapi-shared.yaml#/components/parameters/LimitParam"
        - $ref: "../openapi-shared.yaml#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Archivo de exportación
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/historiales-clinicos:
    get:
      tags:
        - Reporte
      summary: Reporte de historiales clínicos
      description: |
        Retorna un listado de historiales clínicos con diagnósticos y examen físico.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteHistorialesClinicos
      security:
        - BearerAuth: []
      parameters:
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - name: idEmpleado
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por veterinario que atendió
        - name: idMascota
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por mascota
        - $ref: "../openapi-shared.yaml#/components/parameters/LimitParam"
        - $ref: "../openapi-shared.yaml#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Listado de historiales clínicos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOReporteHistoriales"
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/historiales-clinicos/export:
    get:
      tags:
        - Reporte
      summary: Exportar reporte de historiales clínicos
      description: |
        Exporta el reporte de historiales clínicos en formato XLSX o CSV.

        El archivo se descarga con nombre `reporte_historiales-clinicos_{fecha}.{formato}`.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteHistorialesExport
      security:
        - BearerAuth: []
      parameters:
        - name: formato
          in: query
          required: true
          schema:
            type: string
            enum: [xlsx, csv]
          description: Formato de exportación
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - name: idEmpleado
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por veterinario que atendió
        - name: idMascota
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filtrar por mascota
        - $ref: "../openapi-shared.yaml#/components/parameters/LimitParam"
        - $ref: "../openapi-shared.yaml#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Archivo de exportación
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/productos-mas-vendidos:
    get:
      tags:
        - Reporte
      summary: Reporte de productos/servicios más vendidos
      description: |
        Retorna el ranking de productos y servicios más vendidos ordenado por cantidad total vendida.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteProductosMasVendidos
      security:
        - BearerAuth: []
      parameters:
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - $ref: "../openapi-shared.yaml#/components/parameters/LimitParam"
      responses:
        "200":
          description: Ranking de productos y servicios más vendidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOReporteProductos"
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/productos-mas-vendidos/export:
    get:
      tags:
        - Reporte
      summary: Exportar reporte de productos/servicios más vendidos
      description: |
        Exporta el ranking de productos y servicios más vendidos en formato XLSX o CSV.

        El archivo se descarga con nombre `reporte_productos-mas-vendidos_{fecha}.{formato}`.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteProductosMasVendidosExport
      security:
        - BearerAuth: []
      parameters:
        - name: formato
          in: query
          required: true
          schema:
            type: string
            enum: [xlsx, csv]
          description: Formato de exportación
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - $ref: "../openapi-shared.yaml#/components/parameters/LimitParam"
      responses:
        "200":
          description: Archivo de exportación
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/ganancias:
    get:
      tags:
        - Reporte
      summary: Reporte de ganancias
      description: |
        Retorna un análisis de ingresos brutos, costos y ganancia neta agrupado por período.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteGanancias
      security:
        - BearerAuth: []
      parameters:
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - name: agruparPor
          in: query
          schema:
            type: string
            enum: [dia, mes, anio]
            default: mes
          description: Granularidad de agrupación del detalle
      responses:
        "200":
          description: Análisis de ganancias con resumen y detalle por período
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOReporteGanancias"
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/ganancias/export:
    get:
      tags:
