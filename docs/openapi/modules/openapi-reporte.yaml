        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

components:
  schemas:
    ReporteTurnoItem:
      type: object
      properties:
        id:
          type: integer
        fechaHora:
          type: string
          example: "2025-06-15T10:30:00.000Z"
        duracionMinutos:
          type: integer
          example: 30
        motivo:
          type: string
        notas:
          type: string
          nullable: true
        turnoTipo:
          type: string
          example: Consulta
        turnoEstado:
          type: string
          example: Completado
        empleadoNombre:
          type: string
          example: "Dr. Juan Pérez"
        mascotaNombre:
          type: string
          example: Firulais
        mascotaEspecie:
          type: string
          example: Perro
        mascotaRaza:
          type: string
          example: Labrador
        clienteNombre:
          type: string
          example: "María García"

    ReporteHistorialItem:
      type: object
      properties:
        id:
          type: integer
        fechaConsulta:
          type: string
          example: "2025-06-15T10:30:00.000Z"
        motivoConsulta:
          type: string
        tratamiento:
          type: string
          nullable: true
        observaciones:
          type: string
          nullable: true
        empleadoNombre:
          type: string
          example: "Dr. Juan Pérez"
        mascotaNombre:
          type: string
          example: Firulais
        mascotaEspecie:
          type: string
          example: Perro
        mascotaRaza:
          type: string
          example: Labrador
        clienteNombre:
          type: string
          example: "María García"
        diagnosticos:
          type: array
          items:
            type: string
          example: ["Otitis", "Dermatitis"]
        examenFisico:
          type: object
          nullable: true
          properties:
            peso:
              type: number
              nullable: true
              example: 12.5
            temperatura:
              type: number
              nullable: true
              example: 38.5
            frecuenciaCardiaca:
              type: integer
              nullable: true
              example: 80
            frecuenciaRespiratoria:
              type: integer
              nullable: true
              example: 18
            presionArterial:
              type: string
              nullable: true
              example: "120/80"
            saturacionOxigeno:
              type: number
              nullable: true
              example: 98.5

    ReporteProductoItem:
      type: object
      properties:
        tipo:
          type: string
          enum: [PRODUCTO, SERVICIO]
        id:
          type: integer
        nombre:
          type: string
          example: "Vacuna Antirrábica"
        codigoInterno:
          type: string
          example: "VAC-001"
        totalVendido:
          type: integer
          example: 45
        totalIngreso:
          type: number
          example: 4500.00
        precio:
          type: number
          example: 100.00

    ReporteGananciasDetalle:
      type: object
      properties:
        periodo:
          type: string
          example: "2025-06"
        ingresosBrutos:
          type: number
          example: 150000.00
        gananciaNeta:
          type: number
          example: 90000.00
        cantidadVentas:
          type: integer
          example: 120

    ReporteStockBajoItem:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
          example: "Amoxicilina 500mg"
        codigo:
          type: string
          nullable: true
          example: "MED-001"
        codigoInterno:
          type: string
          nullable: true
          example: "AMO-500"
        stockActual:
          type: integer
          example: 2
        stockMinimo:
          type: integer
          example: 10
        diferencia:
          type: integer
          example: -8
        categoria:
          type: string
          nullable: true
          example: "Medicamentos"
        precioVenta:
          type: number
          example: 250.00
        precioCosto:
          type: number
          example: 150.00
        estado:
          type: string
          enum: [SIN_STOCK, STOCK_BAJO]
          example: STOCK_BAJO

    ResponseDTOReporteTurnos:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReporteTurnoItem"
        code:
          type: integer
          example: 200
        error:
          type: string
          example: ""

    ResponseDTOReporteHistoriales:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReporteHistorialItem"
        code:
          type: integer
          example: 200
        error:
          type: string
          example: ""

    ResponseDTOReporteProductos:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReporteProductoItem"
        code:
          type: integer
          example: 200
        error:
          type: string
          example: ""

    ResponseDTOReporteGanancias:
      type: object
      properties:
        data:
          type: object
          properties:
            resumen:
              type: object
              properties:
                ingresosBrutos:
                  type: number
                  example: 500000.00
                gananciaNeta:
                  type: number
                  example: 300000.00
                totalVentas:
                  type: integer
                  example: 450
            detalle:
              type: array
              items:
                $ref: "#/components/schemas/ReporteGananciasDetalle"
        code:
          type: integer
          example: 200
        error:
          type: string
          example: ""

    ResponseDTOReporteStockBajo:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReporteStockBajoItem"
        code:
          type: integer
          example: 200
        error:
          type: string
          example: ""
