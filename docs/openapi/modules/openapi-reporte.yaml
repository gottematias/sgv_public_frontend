            enum: [xlsx, csv]
          description: Formato de exportación
        - name: fechaDesde
          in: query
          schema:
            type: string
            example: "2025-01-01"
          description: Fecha de inicio del rango (YYYY-MM-DD)
        - name: fechaHasta
          in: query
          schema:
            type: string
            example: "2025-12-31"
          description: Fecha de fin del rango (YYYY-MM-DD)
        - name: agruparPor
          in: query
          schema:
            type: string
            enum: [dia, mes, anio]
            default: mes
          description: Granularidad de agrupación del detalle
      responses:
        "200":
          description: Archivo de exportación
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "../openapi-shared.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/stock-bajo:
    get:
      tags:
        - Reporte
      summary: Reporte de stock bajo
      description: |
        Retorna productos cuyo stock actual es igual o menor al stock mínimo configurado.

        **Roles requeridos:** ADMINISTRADOR (5), ADMINISTRADOR_SISTEMA (7)
      operationId: reporteStockBajo
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Listado de productos con stock bajo o sin stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOReporteStockBajo"
        "401":
          $ref: "../openapi-shared.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi-shared.yaml#/components/responses/Forbidden"

  /reporte/stock-bajo/export:
