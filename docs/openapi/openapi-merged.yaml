components:
  schemas:
    LoginDto:
      type: object
      required:
        - usuario
        - contrasena
      properties:
        usuario:
          type: string
          minLength: 4
          description: Nombre de usuario
          example: admin
        contrasena:
          type: string
          minLength: 4
          description: Contraseña
          example: admin123
    TokenResponse:
      type: object
      required:
        - token
        - exp
      properties:
        token:
          type: string
          description: |
            Token JWT. Al decodificarlo contiene el payload con información del usuario autenticado.
            Ver schema `JwtPayload` para estructura completa del payload.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        exp:
          type: string
          format: date-time
          description: Fecha de expiración del token
          example: '2026-02-15T04:45:22.000Z'
    ResponseDTOToken:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          $ref: '#/components/schemas/TokenResponse'
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    ResponseDTOError:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: object
          nullable: true
          description: Null for error responses
        code:
          type: integer
        error:
          type: string
    CreateDireccionDto:
      type: object
      required:
        - idCiudad
        - idPersona
      properties:
        calle:
          type: string
          maxLength: 255
        numero:
          type: string
          maxLength: 20
        piso:
          type: string
          maxLength: 20
        departamento:
          type: string
          maxLength: 20
        observaciones:
          type: string
        idCiudad:
          type: integer
        idPersona:
          type: integer
    CreateContactoDto:
      type: object
      required:
        - dato
        - idContactoTipo
        - idPersona
      properties:
        dato:
          type: string
          minLength: 1
          maxLength: 200
        idContactoTipo:
          type: integer
        idPersona:
          type: integer
    CreatePersonaDto:
      type: object
      required:
        - nombres
        - apellidos
        - documento
        - idDocumentoTipo
      properties:
        nombres:
          type: string
          minLength: 1
          maxLength: 100
          example: Juan Carlos
        apellidos:
          type: string
          minLength: 1
          maxLength: 100
          example: Rodriguez
        documento:
          type: string
          minLength: 1
          maxLength: 100
          example: '30123456'
        idDocumentoTipo:
          type: integer
          example: 1
        direccion:
          $ref: '#/components/schemas/CreateDireccionDto'
        contactos:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/CreateContactoDto'
    ResponseDTOId:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: integer
          description: ID del recurso creado/modificado
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    UpdateDireccionDto:
      type: object
      properties:
        calle:
          type: string
          maxLength: 255
        numero:
          type: string
          maxLength: 20
        piso:
          type: string
          maxLength: 20
        departamento:
          type: string
          maxLength: 20
        observaciones:
          type: string
        idCiudad:
          type: integer
    UpdateContactoDto:
      type: object
      properties:
        dato:
          type: string
          minLength: 1
          maxLength: 200
        idContactoTipo:
          type: integer
    UpdatePersonaDto:
      type: object
      properties:
        nombres:
          type: string
          minLength: 1
          maxLength: 100
        apellidos:
          type: string
          minLength: 1
          maxLength: 100
        documento:
          type: string
          minLength: 1
          maxLength: 100
        idDocumentoTipo:
          type: integer
        direccion:
          $ref: '#/components/schemas/UpdateDireccionDto'
        contactos:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/UpdateContactoDto'
        activo:
          type: boolean
          description: Estado activo del registro
          example: true
    DocumentoTipo:
      type: object
      required:
        - id
        - nombre
      properties:
        id:
          type: integer
        nombre:
          type: string
          maxLength: 100
        descripcion:
          type: string
          nullable: true
    Pais:
      type: object
      required:
        - id
        - nombre
      properties:
        id:
          type: integer
        nombre:
          type: string
          maxLength: 100
    Provincia:
      type: object
      required:
        - id
        - nombre
        - idPais
      properties:
        id:
          type: integer
        nombre:
          type: string
          maxLength: 100
        idPais:
          type: integer
        pais:
          $ref: '#/components/schemas/Pais'
    Ciudad:
      type: object
      required:
        - id
        - nombre
        - codigoPostal
        - idProvincia
      properties:
        id:
          type: integer
        nombre:
          type: string
          maxLength: 100
        codigoPostal:
          type: string
          maxLength: 50
        idProvincia:
          type: integer
        provincia:
          $ref: '#/components/schemas/Provincia'
    Direccion:
      type: object
      required:
        - id
        - idCiudad
        - idPersona
      properties:
        id:
          type: integer
        calle:
          type: string
          maxLength: 255
          nullable: true
        numero:
          type: string
          maxLength: 20
          nullable: true
        piso:
          type: string
          maxLength: 20
          nullable: true
        departamento:
          type: string
          maxLength: 20
          nullable: true
        observaciones:
          type: string
          nullable: true
        idCiudad:
          type: integer
        idPersona:
          type: integer
        ciudad:
          $ref: '#/components/schemas/Ciudad'
    ContactoTipo:
      type: object
      required:
        - id
        - nombre
      properties:
        id:
          type: integer
        nombre:
          type: string
          maxLength: 100
        descripcion:
          type: string
          nullable: true
    Contacto:
      type: object
      required:
        - id
        - dato
        - idContactoTipo
        - idPersona
      properties:
        id:
          type: integer
        dato:
          type: string
          maxLength: 255
        idContactoTipo:
          type: integer
        idPersona:
          type: integer
        contactoTipo:
          $ref: '#/components/schemas/ContactoTipo'
    Persona:
      type: object
      required:
        - id
        - nombres
        - apellidos
        - documento
        - idDocumentoTipo
        - activo
      properties:
        id:
          type: integer
        nombres:
          type: string
          maxLength: 100
        apellidos:
          type: string
          maxLength: 100
        documento:
          type: string
          maxLength: 100
        idDocumentoTipo:
          type: integer
        activo:
          type: boolean
        documentoTipo:
          $ref: '#/components/schemas/DocumentoTipo'
        direcciones:
          type: array
          items:
            $ref: '#/components/schemas/Direccion'
        contactos:
          type: array
          items:
            $ref: '#/components/schemas/Contacto'
    ResponseDTOPersona:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          $ref: '#/components/schemas/Persona'
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    ResponseDTOPersonaArray:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Persona'
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    ResponseDTONull:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: object
          nullable: true
          example: null
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    ResponseDTODocumentoTipoArray:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentoTipo'
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    ResponseDTOContactoTipoArray:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContactoTipo'
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    ResponseDTOCiudadArray:
      type: object
      required:
        - data
        - code
        - error
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ciudad'
        code:
          type: integer
          example: 0
        error:
          type: string
          example: ''
    CreateUsuarioDto:
      type: object
      required:
        - username
        - password
        - idPersona
      properties:
        username:
          type: string
          minLength: 4
          example: jrodriguez
        password:
          type: string
          minLength: 4
          example: password123
        idPersona:
          type: integer
          example: 1
        roles:
          type: array
          items:
            type: integer
          example:
            - 1
    UpdateUsuarioDto:
      type: object
      properties:
        password:
          type: string
          minLength: 4
        activo:
          type: boolean
        roles:
          type: array
          items:
            type: integer
    Rol:
      type: object
      required:
        - id
        - nombre
      properties:
