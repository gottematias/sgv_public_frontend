  /mascota/{id}/imagen-perfil:
    post:
      tags:
        - Mascota
      summary: Subir imagen de perfil de mascota
      description: |
        Sube una imagen de perfil para la mascota especificada.

        **Roles requeridos:** VETERINARIO (1), RECEPCIONISTA (2), ADMINISTRADOR_SISTEMA (7)

        **Validaciones:**
        - Tamaño máximo: 25 MB (26,214,400 bytes)
        - Formatos permitidos: jpg, jpeg, png, gif, bmp, webp, svg, tiff, tif
        - Solo archivos de imagen son aceptados
        - Se crea automáticamente un adjunto de tipo MASCOTA_FOTO_PERFIL
      operationId: mascotaUploadImagenPerfil
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    Archivo de imagen. Máximo 25 MB.
                    Formatos soportados: jpg, jpeg, png, gif, bmp, webp, svg, tiff, tif
                descripcion:
                  type: string
                  maxLength: 250
                  description: Descripción opcional de la imagen
      responses:
        '201':
          description: Imagen subida exitosamente - Retorna el ID del adjunto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOId'
        '400':
          description: |
            Solicitud inválida - Posibles causas:
            - Archivo no es una imagen válida
            - Tamaño excede 25 MB
            - Formato de imagen no permitido
            - Mascota no existe o está inactiva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Mascota
      summary: Eliminar imagen de perfil de mascota
      description: |
        Elimina la imagen de perfil de una mascota.

        **Roles requeridos:** VETERINARIO (1), RECEPCIONISTA (2), ADMINISTRADOR_SISTEMA (7)
      operationId: mascotaDeleteImagenPerfil
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Imagen de perfil eliminada
          content:
