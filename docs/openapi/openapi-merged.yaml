  /pago/{id}/estado:
    patch:
      tags:
        - Venta
      summary: Actualizar estado de un pago
      description: |
        Actualiza el estado de un pago existente y recalcula automáticamente el estado de la venta asociada.

        **Roles requeridos:** CAJERO (3), ADMINISTRADOR_SISTEMA (7)

        **Casos de uso:**
        - Aprobar un pago pendiente (PENDIENTE → APROBADO) y auto-completar la venta si está totalmente pagada
        - Rechazar un pago (PENDIENTE/APROBADO → RECHAZADO) y revertir venta a PENDIENTE si era COMPLETADA
        - Corregir el estado de un pago con sincronización automática del estado de la venta

        **Estados de pago:**
        - APROBADO (1): Pago confirmado y válido
        - RECHAZADO (2): Pago rechazado o inválido
        - PENDIENTE (3): Pago en proceso de verificación

        **Lógica de sincronización con Venta:**
        - Si pagos aprobados >= totalFinal → Venta cambia a COMPLETADA
        - Si pagos aprobados < totalFinal → Venta cambia/permanece PENDIENTE
        - Validación de sobre-pago: Rechaza si aprobar un pago excedería el total de la venta

        **Validaciones:**
        - El pago (id en path) debe existir
        - El estado (idEstado en body) debe ser válido
        - No se permite sobre-pago al aprobar pagos
        - Todas las operaciones son transaccionales (rollback automático en errores)

        **⚠️ BREAKING CHANGE desde v1.1.0:**
        - Ruta cambió de `PATCH /pago/estado` a `PATCH /pago/{id}/estado`
        - El ID del pago ahora va en el path (RESTful), no en el body
        - El DTO solo contiene `idEstado` (se eliminó `idPago`)
      operationId: pagoUpdateEstado
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEstadoDto'
            examples:
              aprobarPago:
                summary: Aprobar un pago pendiente
                value:
                  idEstado: 1
              rechazarPago:
                summary: Rechazar un pago
                value:
                  idEstado: 2
              marcarPendiente:
                summary: Cambiar a pendiente
                value:
                  idEstado: 3
      responses:
        '200':
          description: |
            Estado del pago actualizado exitosamente.
            El estado de la venta también se recalculó automáticamente.
            Retorna el ID del pago actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOId'
              example:
                data: 42
                code: 0
                error: ''
        '400':
          description: |
            Solicitud inválida - Posibles causas:
            - Error de validación en los campos
            - Aprobar el pago excedería el total de la venta (sobre-pago)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOError'
              examples:
                validationError:
                  summary: Error de validación
                  value:
                    data: null
                    code: 400
                    error: idEstado debe ser un número
                overPaymentError:
                  summary: Sobre-pago detectado
                  value:
                    data: null
                    code: 400
                    error: 'El monto total de pagos aprobados excede el total de la venta. Total venta: 1000, Total pagado: 1200'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No encontrado - El pago o el estado no existen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOError'
              examples:
                pagoNotFound:
                  summary: Pago no encontrado
                  value:
                    data: null
                    code: 404
                    error: Pago no encontrada
                estadoNotFound:
                  summary: Estado inválido
                  value:
                    data: null
                    code: 404
                    error: PagoEstado no encontrada
