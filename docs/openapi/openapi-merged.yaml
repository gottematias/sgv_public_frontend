  - name: Usuario
    description: Gestión de usuarios del sistema
  - name: Empleado
    description: Gestión de empleados
  - name: Mascota
    description: Gestión de mascotas
  - name: HistorialClinico
    description: Historiales clínicos y consultas
  - name: Vacuna
    description: Registro de vacunaciones
  - name: Turno
    description: Gestión de citas/turnos
  - name: Adjunto
    description: Gestión de archivos adjuntos
  - name: Stock
    description: Gestión de inventario, productos y servicios
  - name: Venta
    description: Gestión de ventas y pagos
  - name: Catalogos
    description: Datos maestros y catálogos
  - name: Reporte
    description: Reportes e indicadores de negocio (BI)
  - name: Backup
    description: Backup y restauración de base de datos — manual y programado (solo ADMINISTRADOR_SISTEMA)
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: |
        Verifica el estado del servidor. No requiere autenticación y está excluido del rate limiting.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Servidor en línea
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      timestamp:
                        type: string
                        format: date-time
                        example: '2026-02-28T12:00:00.000Z'
                  code:
                    type: integer
                    example: 0
                  error:
                    type: string
                    example: ''
  /auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesión
      description: |
        Autentica un usuario y retorna un token JWT.

        **Contenido del JWT:**
        El token incluye información completa del usuario en su payload:
        - Identificación del usuario (usuario_id, usuario_nombre)
        - Datos de la persona asociada (persona_id, persona_nombre, persona_apellido)
        - Roles asignados (rol_id - array de IDs)

        Esta información permite al frontend:
        - Mostrar nombre completo del usuario sin consultas adicionales
        - Implementar autorización basada en roles del lado del cliente
        - Personalizar la UI según el perfil del usuario

        Ver schema `JwtPayload` para estructura completa del payload decodificado.

        **Límite de tasa:** 5 requests por 60 segundos por IP (prevención de fuerza bruta)
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '201':
          description: Login exitoso - Retorna token JWT con payload expandido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refreshtoken:
    get:
      tags:
        - Auth
      summary: Renovar token JWT
      description: |
        Renueva el token JWT con una nueva fecha de expiración.

        **Actualización de datos:**
        El nuevo token contiene información actualizada del usuario desde la base de datos:
        - Si cambiaron los roles del usuario, el nuevo token reflejará esos cambios
        - Si cambió el nombre de la persona, se actualizará en el payload
        - Si el usuario fue desactivado, la renovación fallará con 401

        Usar este endpoint antes de que expire el token actual para mantener la sesión activa.

        Ver schema `JwtPayload` para estructura completa del payload.
      operationId: authRefreshToken
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token renovado con información actualizada del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOToken'
        '401':
          $ref: '#/components/responses/Unauthorized'
