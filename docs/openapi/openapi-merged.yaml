    CreatePagoDto:
      type: object
      description: Crea un pago asociado a una venta. El sistema valida automáticamente que la suma de pagos aprobados no exceda el total de la venta (con tolerancia de 0.01 para redondeo). Si el pago está aprobado y completa el total, la venta cambia automáticamente a estado COMPLETADA.
      required:
        - monto
        - idMetodoPago
        - idVenta
        - idEstado
      properties:
        monto:
          type: number
          description: Monto del pago. Debe ser mayor a 0. No puede exceder el monto restante de la venta.
        montoBonificado:
          type: number
          description: Monto bonificado o descontado. Debe ser mayor o igual a 0.
        referencia:
          type: string
          description: Referencia del pago (número de transacción, cheque, etc.)
        idMetodoPago:
          type: integer
          description: ID del método de pago (efectivo, tarjeta, transferencia, etc.)
        idVenta:
          type: integer
          description: ID de la venta a la que pertenece este pago
        idEstado:
          type: integer
          description: ID del estado del pago (1=Pendiente, 2=Aprobado, 3=Rechazado)
    UpdateEstadoDto:
      type: object
      description: |
        Actualiza el estado de un pago existente (el ID del pago va en la ruta).

        **Funcionalidad mejorada (v1.1.0+):**
        - Recalcula automáticamente el estado de la venta asociada
        - Auto-completa la venta si los pagos aprobados cubren el total
        - Revierte la venta a PENDIENTE si los pagos ya no cubren el total
        - Valida que aprobar el pago no cause sobre-pago
        - Operación transaccional con rollback automático en errores
      required:
        - idEstado
      properties:
        idEstado:
          type: integer
          description: |
            Nuevo estado del pago:
            - 1 = APROBADO (pago confirmado, cuenta para completar venta)
            - 2 = RECHAZADO (pago inválido, no cuenta para completar venta)
            - 3 = PENDIENTE (pago en verificación, no cuenta para completar venta)
          minimum: 1
          maximum: 3
          example: 1
