    CreatePagoInVentaDto:
      type: object
      description: |
        DTO para crear pagos junto con la venta. Similar a CreatePagoDto pero sin idVenta (se asigna automáticamente).
        Los pagos con estado APROBADO (1) cuentan para completar la venta automáticamente.
      required:
        - monto
        - idMetodoPago
        - idEstado
      properties:
        monto:
          type: number
          format: decimal
          minimum: 0.01
          description: Monto del pago. Debe ser mayor a 0.01.
          example: 1500
        montoBonificado:
          type: number
          format: decimal
          minimum: 0
          description: Monto bonificado, descuento o crédito aplicado. Cuenta para el total pagado.
          example: 50
        referencia:
          type: string
          maxLength: 100
          description: Referencia del pago (número de transacción, cheque, etc.)
          example: CARD-12345
        idMetodoPago:
          type: integer
          description: ID del método de pago activo (efectivo, tarjeta, transferencia, etc.)
          example: 1
        idEstado:
          type: integer
          description: |
            ID del estado del pago:
            - 1 = APROBADO (cuenta para completar la venta)
            - 2 = RECHAZADO (no cuenta)
            - 3 = PENDIENTE (no cuenta)
          example: 1
    CreateVentaDto:
      type: object
      required:
        - idEmpleado
        - detalles
      properties:
        idCliente:
          type: integer
          description: ID del cliente/persona asociado a la venta (opcional)
        idEmpleado:
          type: integer
          description: ID del empleado que registra la venta (requerido)
        montoAjusteRedondeo:
          type: number
          format: decimal
          description: Ajuste por redondeo aplicado al total (puede ser positivo o negativo)
          example: 0.5
        detalles:
          type: array
          minItems: 1
          description: Lista de productos/servicios vendidos (mínimo 1 item)
          items:
            $ref: '#/components/schemas/DetalleVentaDto'
        pagos:
          type: array
          description: |
            **NUEVO:** Array opcional de pagos a crear junto con la venta.
            - Si se omite o está vacío, la venta se crea en estado PENDIENTE
            - Si los pagos APROBADOS cubren el totalFinal, la venta pasa a estado COMPLETADA
            - La suma de (monto + montoBonificado) no puede exceder totalFinal (tolerancia: 0.01)
            - Los pagos se crean en la misma transacción que la venta (todo o nada)
          items:
            $ref: '#/components/schemas/CreatePagoInVentaDto'
    UpdateVentaDto:
      type: object
      properties:
        idCliente:
          type: integer
        detalles:
          type: array
          items:
            $ref: '#/components/schemas/DetalleVentaDto'
