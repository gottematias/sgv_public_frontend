  /venta/create:
    post:
      tags:
        - Venta
      summary: Crear venta con pagos opcionales
      description: |
        Crea una venta con sus detalles (productos/servicios) y opcionalmente registra pagos en la misma transacción.

        **Características:**
        - Actualiza automáticamente el stock de productos
        - Crea movimientos de stock tipo "Venta"
        - Preserva precios históricos en los detalles
        - **NUEVO:** Permite incluir array opcional de pagos que se crean junto con la venta
        - Si los pagos aprobados cubren el total, la venta se marca como COMPLETADA automáticamente

        **Estados de venta:**
        - PENDIENTE (1): Venta sin pagos o con pagos parciales
        - COMPLETADA (2): Venta con pagos aprobados >= totalFinal
        - CANCELADA (3): Venta anulada

        **Validaciones de pagos:**
        - Solo pagos con estado APROBADO (1) cuentan para completar la venta
        - La suma de pagos (monto + montoBonificado) no puede exceder totalFinal (tolerancia: 0.01)
        - Si se incluyen pagos, se validan foreign keys (idMetodoPago, idEstado)

        **Casos de uso:**
        - Sin pagos: `{ "idEmpleado": 1, "detalles": [...] }` → Venta PENDIENTE
        - Pago parcial: `{ "pagos": [{ "monto": 500, ... }] }` → Venta PENDIENTE
        - Pago completo: `{ "pagos": [{ "monto": 1000, "idEstado": 1, ... }] }` → Venta COMPLETADA
        - Múltiples pagos: `{ "pagos": [pago1, pago2] }` → Estado según total
      operationId: ventaCreate
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVentaDto"
            examples:
              ventaSinPagos:
                summary: Venta sin pagos (comportamiento original)
                value:
                  idEmpleado: 1
                  idCliente: 5
                  detalles:
                    - idProducto: 10
                      cantidad: 2
                    - idServicio: 3
                      cantidad: 1
              ventaConPagoCompleto:
                summary: Venta con pago completo en efectivo
                value:
                  idEmpleado: 1
                  idCliente: 5
                  detalles:
                    - idProducto: 10
                      cantidad: 1
                  pagos:
                    - monto: 1500.00
                      idMetodoPago: 1
                      idEstado: 1
                      referencia: "CASH-001"
              ventaConMultiplesPagos:
                summary: Venta con múltiples métodos de pago
                value:
                  idEmpleado: 1
                  detalles:
                    - idProducto: 10
                      cantidad: 2
                  pagos:
                    - monto: 1000.00
                      idMetodoPago: 1
                      idEstado: 1
                    - monto: 500.00
                      montoBonificado: 50.00
                      idMetodoPago: 2
                      idEstado: 1
                      referencia: "CARD-12345"
      responses:
        "201":
          description: Venta creada exitosamente. Retorna el ID de la venta. El estado será PENDIENTE o COMPLETADA dependiendo de los pagos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOId"
        "400":
          description: |
            Solicitud inválida - Posibles causas:
            - Detalles vacíos o inválidos
            - Stock insuficiente para productos
            - Total de pagos excede el total de la venta
            - Método de pago inactivo o no existe
            - Estado de pago inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/venta/update/{id}":
    put:
      tags:
        - Venta
      summary: Actualizar venta
      description: Solo permite actualizar ventas en estado "Pendiente"
      operationId: ventaUpdate
      security:
