  /pago/estados:
    get:
      tags:
        - Catalogos
      summary: Listar estados de pago
      description: |
        Obtiene el catálogo completo de estados de pago disponibles.

        **⚠️ BREAKING CHANGE desde v1.1.0:**
        - Ruta cambió de `GET /pago/estado/list` a `GET /pago/estados`
        - Sigue convención RESTful: plural para listar recursos
      operationId: pagoEstadoList
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de estados de pago
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOPagoEstadoArray"
              example:
                data:
                  - id: 1
                    nombre: "APROBADO"
                  - id: 2
                    nombre: "RECHAZADO"
                  - id: 3
                    nombre: "PENDIENTE"
                code: 0
                error: ""
        "401":
          $ref: "#/components/responses/Unauthorized"
