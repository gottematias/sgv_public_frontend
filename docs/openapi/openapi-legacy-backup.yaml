  /adjunto/upload:
    post:
      tags:
        - Adjunto
      summary: Subir archivo
      description: >
        Sube un archivo adjunto al sistema.


        **Validaciones:**

        - Tamaño máximo: 25 MB (26,214,400 bytes)

        - **Imágenes**: jpg, jpeg, png, gif, bmp, webp, svg, tiff, tif

        - **Documentos**: pdf, doc, docx, xls, xlsx, ppt, pptx, txt, csv, rtf,
        odt, ods

        - El tipo MIME del archivo debe corresponder con la extensión

        - El idAdjuntoTipo debe corresponder con el tipo de archivo
      operationId: adjuntoUpload
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - descripcion
                - idAdjuntoTipo
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    Archivo a subir. Máximo 25 MB.


                    Extensiones de imagen: jpg, jpeg, png, gif, bmp, webp, svg,
                    tiff, tif


                    Extensiones de documento: pdf, doc, docx, xls, xlsx, ppt,
                    pptx, txt, csv, rtf, odt, ods
                descripcion:
                  type: string
                  minLength: 1
                  maxLength: 250
                  description: Descripción del archivo (requerido)
                idAdjuntoTipo:
                  type: integer
                  description: |
                    Tipo de adjunto. Debe corresponder con el tipo de archivo.
                    Usar GET /adjunto/tipo/list para obtener tipos disponibles
      responses:
        "201":
          description: Archivo subido exitosamente - Retorna el ID del adjunto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOId"
        "400":
          description: >
            Solicitud inválida - Posibles causas:

            - Archivo no proporcionado o vacío

            - Tamaño excede 25 MB

            - Extensión de archivo no permitida

            - Tipo MIME no coincide con la extensión

            - idAdjuntoTipo inválido, no existe, o no corresponde con el tipo de
            archivo

            - Campo descripcion vacío o excede 250 caracteres
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDTOError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  "/adjunto/download/{id}":
    get:
      tags:
        - Adjunto
      summary: Descargar archivo
      operationId: adjuntoDownload
      security:
        - BearerAuth: []
      parameters:
