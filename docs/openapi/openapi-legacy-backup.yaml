openapi: 3.0.3
info:
  title: SGV - Sistema de Gestión Veterinaria API
  version: 1.0.0
  description: >
    API REST para gestión de clínica veterinaria.


    ## Autenticación

    La API utiliza JWT Bearer Token. Obtener token via POST /auth/login

    e incluirlo en el header: `Authorization: Bearer {token}`


    **Contenido del JWT:**

    El token contiene un payload firmado con información del usuario autenticado:

    - `usuario_id`: ID del usuario

    - `usuario_nombre`: Nombre de usuario (username)

    - `persona_id`: ID de la persona asociada

    - `persona_nombre`: Nombres de la persona

    - `persona_apellido`: Apellidos de la persona

    - `rol_id`: Array de IDs de roles asignados


    Esta información permite al frontend mostrar datos del usuario y gestionar

    permisos sin consultas adicionales al backend. Ver schema `JwtPayload` para

    detalles completos.


    ## Rate Limiting

    La API implementa límites de tasa para prevenir abuso:

    - **Global**: 100 requests por 60 segundos por dirección IP

    - **Login**: 5 requests por 60 segundos por dirección IP (prevención de
    fuerza bruta)

    - Cuando se excede el límite, se retorna HTTP 429 (Too Many Requests)

    - Los límites son configurables via variables de entorno (THROTTLE_TTL,
    THROTTLE_LIMIT, THROTTLE_LOGIN_LIMIT)


    ## Formato de Respuesta

    Todas las respuestas usan el wrapper ResponseDTO:

    ```json

    {
      "data": any,
      "code": 0,
      "error": ""
    }

    ```


    ## Mensajes de Error

    Todos los mensajes de error se devuelven en **español** para mejorar la
    experiencia del usuario:

    - Los errores técnicos se traducen automáticamente a mensajes amigables

    - Los mensajes específicos de entidades se generalizan (ej: "Persona con ID
    5 no encontrado" → "Recurso no encontrado")

    - Los logs del backend mantienen información técnica detallada para
    debugging
  contact:
    name: SGV Team
