<p-confirmDialog
  [key]="'personaLista'"
  position="top"
  [closeOnEscape]="false"
  [dismissableMask]="false"
>
</p-confirmDialog>
<div class="card flex flex-column h-full">
  <div class="flex p-2 gap-3 flex-wrap">
    @if (puedeVerActivo) {
      <p-select
        [options]="filtrosActivo"
        [(ngModel)]="filtroActivoSeleccionado"
        optionLabel="label"
        (onChange)="onFiltroActivoChange()"
        placeholder="Filtrar por estado"
        [style]="{ width: '140px' }"
        pTooltip="Filtrar por estado activo/inactivo"
        tooltipPosition="bottom"
        [tooltipOptions]="{ life: 3000 }"
      ></p-select>
    }

    <div class="flex-1">
      <p-iconfield iconPosition="left" class="w-full">
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onSearchInput()"
          placeholder="Buscar por nombre, apellido o documento"
          class="w-full"
          pTooltip="Escriba 2 o más caracteres para buscar"
          tooltipPosition="bottom"
          [life]="3000"
        />
      </p-iconfield>
    </div>

    <div class="flex gap-2">
      @if (habilitaCrearPersona) {
        <p-button
          styleClass="h-full"
          [style]="{ 'aspect-ratio': '1' }"
          (onClick)="crearPersonaBoton()"
          icon="pi pi-plus"
          pTooltip="Crear nueva persona"
          tooltipPosition="bottom"
          [tooltipOptions]="{ life: 3000 }"
        />
      }

      <p-button
        styleClass="h-full"
        [style]="{ 'aspect-ratio': '1' }"
        icon="pi pi-pencil"
        severity="warn"
        [disabled]="!habilitaEditarPersona"
        (onClick)="editarPersonaBoton()"
        pTooltip="Editar persona seleccionada"
        tooltipPosition="bottom"
        [tooltipOptions]="{ life: 3000 }"
      />

      <p-button
        styleClass="h-full"
        [style]="{ 'aspect-ratio': '1' }"
        icon="pi pi-trash"
        severity="danger"
        [disabled]="!habilitaEliminarPersona"
        (onClick)="eliminarPersonaBoton()"
        pTooltip="Eliminar persona seleccionada"
        tooltipPosition="bottom"
        [tooltipOptions]="{ life: 3000 }"
      />
    </div>
  </div>
  <div class="table-container" #tableContainer>
    <p-table
      #dt
      [value]="listaPersonas"
      selectionMode="single"
      [(selection)]="personaSeleccionada"
      (onRowSelect)="onRowSelect()"
      (onRowUnselect)="onRowUnselect()"
      styleClass="p-datatable-striped"
    >
      <ng-template pTemplate="header">
        <tr>
          <th scope="col">Apellido</th>
          <th scope="col">Nombre</th>
          <th scope="col">Documento</th>
          @if (puedeVerActivo) {
            <th scope="col">Activo</th>
          }
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-persona>
        <tr [pSelectableRow]="persona">
          <td>{{ persona.apellidos }}</td>
          <td>{{ persona.nombres }}</td>
          <td>
            {{
              (persona.documentoTipo?.nombre || "-") +
                " " +
                (persona.documento || "-")
            }}
          </td>
          @if (puedeVerActivo) {
            <td>
              <span
                [class]="
                  persona.activo
                    ? 'pi pi-check-circle text-green-500'
                    : 'pi pi-times-circle text-red-500'
                "
              ></span>
            </td>
          }
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="text-center">No se encontraron personas</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
