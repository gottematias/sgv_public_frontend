<div
  *ngIf="cargandoDatos"
  class="flex justify-content-center align-items-center p-5"
>
  <i class="pi pi-spin pi-spinner text-4xl text-primary"></i>
</div>

<div
  *ngIf="!cargandoDatos && idEmpleado"
  class="overflow-y-auto p-4"
  style="max-width: 1400px; margin: 0 auto"
>
  <app-accesos-rapidos-veterinario
    [idVeterinario]="idEmpleado"
    (turnoCreado)="onTurnoCreado()"
  ></app-accesos-rapidos-veterinario>

  <p-divider></p-divider>

  <app-busqueda-rapida [idVeterinario]="idEmpleado"></app-busqueda-rapida>

  <p-divider></p-divider>

  <div class="grid">
    <div class="col-12 lg:col-6">
      <app-turnos-veterinario
        [idVeterinario]="idEmpleado"
      ></app-turnos-veterinario>
    </div>

    <div class="col-12 lg:hidden my-1">
      <p-divider></p-divider>
    </div>

    <div
      class="hidden lg:flex lg:col-fixed align-items-stretch px-1"
      style="width: auto"
    >
      <p-divider layout="vertical"></p-divider>
    </div>

    <div class="col-12 lg:col">
      <app-vacunas-veterinario></app-vacunas-veterinario>
    </div>
  </div>
</div>

<div *ngIf="!cargandoDatos && !idEmpleado" class="text-center p-5">
  <i class="pi pi-exclamation-triangle text-6xl text-400 mb-3"></i>
  <p class="text-500">No se pudo cargar el dashboard del veterinario</p>
</div>
