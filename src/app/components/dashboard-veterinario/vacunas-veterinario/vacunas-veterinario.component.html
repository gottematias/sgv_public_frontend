<div>
  <div class="flex justify-content-between align-items-center mb-3">
    <h2 class="text-xl font-semibold">Vacunas Próximas</h2>
    <p-button
      icon="pi pi-refresh"
      [rounded]="true"
      [text]="true"
      severity="secondary"
      (onClick)="refrescarVacunas()"
      [loading]="cargandoVacunas"
      pTooltip="Refrescar vacunas"
      tooltipPosition="bottom"
      [tooltipOptions]="{ life: 3000 }"
    ></p-button>
  </div>

  <div
    *ngIf="cargandoVacunas"
    class="flex justify-content-center align-items-center p-5"
  >
    <i class="pi pi-spin pi-spinner text-4xl text-primary"></i>
  </div>

  <div
    *ngIf="!cargandoVacunas"
    class="overflow-y-auto px-2"
    style="max-height: 600px"
  >
    <div
      *ngFor="let vacuna of vacunas"
      class="card mb-3 p-3 border-round-lg shadow-2 hover:shadow-4 transition-all transition-duration-200 border-1 surface-border cursor-pointer"
      tabindex="0"
      role="button"
      (click)="verVacuna(vacuna)"
      (keydown.enter)="verVacuna(vacuna)"
      (keydown.space)="verVacuna(vacuna); $event.preventDefault()"
    >
      <div class="flex justify-content-end mb-2">
        <p-tag
          [value]="
            getDiasRestantesTexto(
              getDiasRestantes(vacuna.fechaProximaAplicacion!)
            )
          "
          [severity]="
            getDiasRestantesSeverity(
              getDiasRestantes(vacuna.fechaProximaAplicacion!)
            )
          "
        ></p-tag>
      </div>

      <div class="flex align-items-center gap-2 mb-2">
        <i class="pi pi-calendar text-xl text-primary"></i>
        <span class="text-xl font-bold">{{
          formatFecha(vacuna.fechaProximaAplicacion!)
        }}</span>
      </div>

      <div class="flex align-items-center gap-2 mb-2">
        <i class="pi pi-heart text-primary"></i>
        <span class="font-semibold">{{ vacuna.mascota?.nombre || "-" }}</span>
        <i class="pi pi-user text-500 ml-2"></i>
        <span class="text-500">{{
          getDuenoNombre(vacuna.mascota?.persona)
        }}</span>
      </div>

      <div class="flex align-items-center gap-2 mb-1">
        <i class="pi pi-shield text-primary"></i>
        <span class="text-sm">{{ vacuna.vacunaTipo?.nombre || "-" }}</span>
      </div>
    </div>

    <div *ngIf="vacunas.length === 0" class="text-center p-5">
      <i class="pi pi-calendar-times text-6xl text-400 mb-3"></i>
      <p class="text-500">
        No hay vacunas próximas a aplicar en los próximos 30 días
      </p>
    </div>
  </div>
</div>
